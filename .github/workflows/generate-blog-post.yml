name: Generate Blog Post PR

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"

  workflow_dispatch:
    inputs:
      topic:
        description: "Topic slug override (leave empty for random)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog post
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC_OVERRIDE: ${{ inputs.topic }}
        run: node scripts/generate-blog-post.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "blog: add post — ${{ steps.generate.outputs.title }}"
          branch: "blog/${{ steps.generate.outputs.slug }}"
          title: "📝 New Blog Post: ${{ steps.generate.outputs.title }}"
          body: |
            ## Auto-generated blog post

            **Topic:** ${{ steps.generate.outputs.title }}
            **Slug:** `${{ steps.generate.outputs.slug }}`

            This post was generated by the `generate-blog-post` workflow using GitHub Models.

            ### Review checklist
            - [ ] Content is accurate and well-written
            - [ ] Code examples are correct and complete
            - [ ] Tags and metadata look good
            - [ ] No hallucinated tools or commands

            ---
            *Auto-generated by [generate-blog-post.yml](.github/workflows/generate-blog-post.yml)*
          labels: blog, auto-generated
          assignees: tanmaycodes13
          delete-branch: true
